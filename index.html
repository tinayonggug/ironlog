  :root {
    --ink0: #15171B;
    --ink1: #1D2026;
    --ink2: #272B31;
    --line: #32363E;
    --chalk: #EAE7E0;
    --dim: #A19D95;
    --faint: #6E6B64;
    --blue: #5B8FD4;
    --blue-deep: #3D6CAC;
    --red: #D6604C;
    --yellow: #D9A44A;
    --green: #7BAE7F;
    --disp: 'Barlow Condensed', 'Avenir Next Condensed', 'Arial Narrow', sans-serif;
    --ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--ink0);
    color: var(--chalk);
    font-family: var(--ui);
    font-size: 16px;
    line-height: 1.45;
    min-height: 100dvh;
    touch-action: manipulation; /* no double-tap zoom */
    -webkit-user-select: none; user-select: none;
  }
  input, textarea { -webkit-user-select: text; user-select: text; }
  #app { max-width: 440px; margin: 0 auto; min-height: 100dvh; }
  @media (min-width: 500px) {
    body { background: #101216; }
    #app { background: var(--ink0); border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
  }

  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--blue); outline-offset: 2px;
  }
  input, textarea { font: inherit; color: var(--chalk); }

  .disp { font-family: var(--disp); font-weight: 700; text-transform: uppercase; letter-spacing: .02em; }
  .num { font-variant-numeric: tabular-nums; }

  /* ---------- header ---------- */
  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: calc(18px + env(safe-area-inset-top, 0px)) 20px 0;
  }
  .brand { font-family: var(--disp); font-weight: 700; font-size: 19px; letter-spacing: .14em; text-transform: uppercase; }
  .brand .bar { color: var(--red); }
  .kg-badge { font-size: 12px; color: var(--faint); letter-spacing: .08em; text-transform: uppercase; }

  main { padding: 10px 16px calc(110px + env(safe-area-inset-bottom)); }

  .viewdate {
    font-family: var(--disp); font-weight: 700; font-size: 34px; line-height: 1.1;
    text-transform: uppercase; letter-spacing: .01em; text-wrap: balance;
    padding: 14px 4px 4px;
  }
  .viewsub { color: var(--dim); font-size: 14px; padding: 0 4px 14px; }

  /* ---------- backup nudge ---------- */
  .nudge {
    display: flex; align-items: center; gap: 12px;
    background: color-mix(in srgb, var(--yellow) 12%, var(--ink1));
    border: 1px solid color-mix(in srgb, var(--yellow) 45%, transparent);
    border-radius: 10px; padding: 12px 14px; margin: 4px 0 14px;
    font-size: 14px; color: var(--chalk);
  }
  .nudge b { color: var(--yellow); font-weight: 600; }
  .nudge button {
    margin-left: auto; flex-shrink: 0;
    background: var(--yellow); color: #1A1508; font-weight: 600; font-size: 14px;
    padding: 8px 14px; border-radius: 8px; min-height: 40px;
  }

  /* ---------- exercise cards ---------- */
  .excard {
    background: var(--ink1); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 14px 16px; margin-bottom: 14px;
  }
  .exhead { display: flex; align-items: baseline; gap: 10px; }
  .exname { font-family: var(--disp); font-weight: 700; font-size: 22px; text-transform: uppercase; letter-spacing: .03em; }
  .exdrop { margin-left: auto; color: var(--faint); font-size: 13px; padding: 4px 6px; min-height: 32px; }
  .exdrop.arm { color: var(--red); font-weight: 600; }
  .lasttime { color: var(--dim); font-size: 14px; margin-top: 2px; }
  .lasttime b { color: var(--chalk); font-weight: 600; }

  .setrows { margin: 10px 0 4px; }
  .setrow {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 2px; border-bottom: 1px solid var(--line); font-size: 16px;
  }
  .setrow:last-child { border-bottom: none; }
  .setno { color: var(--faint); font-size: 13px; width: 20px; }
  .setval { font-variant-numeric: tabular-nums; }
  .setval .x { color: var(--faint); padding: 0 3px; }
  .prchip {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    color: var(--red); border: 1px solid var(--red); border-radius: 5px;
    padding: 1px 6px;
  }
  .setdel { margin-left: auto; color: var(--faint); font-size: 18px; padding: 2px 10px; min-height: 44px; }
  .setdel.arm { color: var(--red); font-size: 13px; font-weight: 600; }

  /* ---------- steppers ---------- */
  .logbar { display: flex; gap: 10px; margin-top: 12px; }
  .step {
    flex: 1; background: var(--ink2); border: 1px solid var(--line); border-radius: 10px;
    display: flex; align-items: stretch; overflow: hidden;
  }
  .step button {
    width: 44px; min-height: 54px; color: var(--dim); font-size: 22px; flex-shrink: 0;
  }
  .step button:active { background: var(--line); }
  .stepmid { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 0; }
  .stepmid input {
    width: 100%; background: none; border: none; text-align: center;
    font-family: var(--disp); font-weight: 700; font-size: 26px;
    font-variant-numeric: tabular-nums; padding: 0;
  }
  .steplbl { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); }

  .banddot {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    border: 1px solid var(--line); margin-right: 7px; vertical-align: -1px;
  }
  .bandval { font-family: var(--disp); font-weight: 700; font-size: 21px; text-transform: uppercase; letter-spacing: .03em; }
  .dualrow { display: flex; gap: 8px; margin-top: 12px; }
  .dualrow .chip { flex: 1; text-align: center; }
  .barrow {
    display: flex; align-items: center; gap: 7px; margin-top: 10px;
    color: var(--faint); font-size: 13px;
  }
  .barrow input {

<script>
'use strict';

/* ================= state ================= */
const KEY = 'ironlog.v1';
let db = load();
let tab = 'log';
let ui = {
  addingEx: false,        // add-exercise form open
  addMode: 'browse',      // 'browse' catalog | 'custom' free text
  addGroup: null,         // selected body group
  addExName: null,        // selected catalog exercise
  addEquip: null,         // selected equipment
  customName: '',         // free-text name (survives re-renders)
  pending: {},            // exId -> {w, r} stepper values
  notesOpen: {},          // exId -> bool
  armed: null,            // id of button awaiting delete confirmation
  armTimer: null,
  importPending: null,    // parsed backup awaiting merge/replace choice
  exportedFlash: false,
  calY: null, calM: null, // calendar month in view
  calSel: null,           // selected calendar date
  logDate: null,          // date the Log tab edits; null = today
  trendEx: null,          // exercise key shown in the trends chart
};
const LD = () => ui.logDate || todayStr();

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && Array.isArray(d.workouts)) {
        if (!d.bodyweight) d.bodyweight = {};
        if (!d.profile) d.profile = {};
        return d;
      }
    }
  } catch (e) {}
  return { workouts: [], bodyweight: {}, profile: {}, settings: { unit: 'kg', lastExport: null, nudgeSnooze: null } };
}
function save() { localStorage.setItem(KEY, JSON.stringify(db)); }

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.floor(Math.random() * 1e6));
const todayStr = () => {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
};
const unit = () => db.settings.unit || 'kg';
const wStep = () => unit() === 'kg' ? 2.5 : 5;

/* ================= exercise catalog ================= */

  ],
};
const GROUPS = Object.keys(CATALOG);
const ALL_EQUIP = ['Barbell', 'Dumbbell', 'Kettlebell', 'Bodyweight', 'Machine', 'Cable', 'Band'];
const EQ_SHORT = { Barbell: 'BB', Dumbbell: 'DB', Kettlebell: 'KB', Bodyweight: 'BW', Machine: 'MACH', Cable: 'CBL', Band: 'BAND' };

function allowedEquip(name) {
  for (const g of GROUPS)
    for (const e of CATALOG[g])
      if (e[0] === name) return e[1];
  return ALL_EQUIP;
}
function exKey(name, equip, wedge) {
  return (name || '').trim().toLowerCase() + '|' + (equip || '').toLowerCase() + (wedge ? '|wdg' : '');
}

/* ================= helpers ================= */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function fmtW(n) { return String(Math.round(n * 100) / 100); }
function dateObj(ds) { return new Date(ds + 'T12:00:00'); }
function fmtLong(ds) {
  return dateObj(ds).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}
function fmtShort(ds) {
  const d = dateObj(ds);
  const opts = { month: 'short', day: 'numeric' };
  if (d.getFullYear() !== new Date().getFullYear()) opts.year = 'numeric';
  return d.toLocaleDateString(undefined, opts);
}
function sortedWorkouts() {
  return [...db.workouts].sort((a, b) => b.date.localeCompare(a.date));
}
function getSession() { return db.workouts.find(w => w.date === LD()); }
function ensureSession() {
  let s = getSession();
  if (!s) { s = { id: uid(), date: LD(), note: '', exercises: [] }; db.workouts.push(s); }
  return s;
}

/* Most recent performance of an exercise variant before the day being logged */
function lastTime(name, equip, wedge) {
  const key = exKey(name, equip, wedge);
  for (const w of sortedWorkouts()) {
    if (w.date >= LD()) continue;
    for (const ex of w.exercises) {
      if (exKey(ex.name, ex.equip, ex.wedge) === key && ex.sets.length) {
        return { date: w.date, sets: ex.sets };
      }
    }
  }
  return null;
}
function maxWeight(name, equip, wedge) {
  const key = exKey(name, equip, wedge);
  let m = 0;
  for (const w of db.workouts) {
    if (w.date > LD()) continue; /* backfilled days only count history up to that day */
    for (const ex of w.exercises)
      if (exKey(ex.name, ex.equip, ex.wedge) === key)
        for (const s of ex.sets) {
          if (s.wu) continue; /* warm-ups never count toward PRs */
          const eff = (s.w || 0) * (s.dual ? 2 : 1);
          if (eff > m) m = eff;
        }
  }
  return m;
}
function knownExercises() {
  const seen = new Map();
  for (const w of sortedWorkouts())
    for (const ex of w.exercises) {
      const key = exKey(ex.name, ex.equip, ex.wedge);
      if (ex.name.trim() && !seen.has(key))
        seen.set(key, { name: ex.name.trim(), equip: ex.equip || null, group: ex.group || null, wedge: !!ex.wedge });
    }
  return [...seen.values()];
}
function lastBodyweight() {
  const ds = Object.keys(db.bodyweight).sort();
  if (!ds.length) return null;
  const d = ds[ds.length - 1];
  return { date: d, v: db.bodyweight[d] };
}
function equipTag(ex) {
  return (ex.equip ? '<span class="equiptag">' + esc(EQ_SHORT[ex.equip] || ex.equip) + '</span>' : '')
    + (ex.wedge ? '<span class="equiptag">WEDGE</span>' : '')
    + (ex.ss ? '<span class="sstag">SS</span>' : '');
}

/* ================= TDEE ================= */
const ACTIVITY = [
  [1.2, 'Sedentary', 'little exercise'],
  [1.375, 'Light', '1–3 sessions/week'],
  [1.55, 'Moderate', '3–5 sessions/week'],
  [1.725, 'Active', '6–7 sessions/week'],
  [1.9, 'Athlete', 'hard daily training'],
];
const GOALS = [[-500, 'Cut'], [-250, 'Lean cut'], [0, 'Maintain'], [250, 'Lean bulk'], [500, 'Bulk']];

function ageFromDob(dob) {
  const b = new Date(dob + 'T12:00:00'), n = new Date();
  let a = n.getFullYear() - b.getFullYear();
  const m = n.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && n.getDate() < b.getDate())) a--;
  return a;
}
function profileComplete() {
  const p = db.profile;
  return !!(p && p.dob && p.heightCm && p.sex);
}
/* Mifflin-St Jeor BMR x activity multiplier */
function tdeeInfo() {
  if (!profileComplete()) return null;
  const p = db.profile;
  const age = ageFromDob(p.dob);
  if (!(age > 0 && age < 120)) return null;
  const lb = lastBodyweight();
  if (!lb) return { missingWeight: true };
  const kg = unit() === 'lb' ? lb.v * 0.45359237 : lb.v;
  const bmr = Math.round(10 * kg + 6.25 * p.heightCm - 5 * age + (p.sex === 'm' ? 5 : -161));
  const tdee = Math.round(bmr * (p.activity || 1.55));
  const goal = p.goal || 0;
  return { bmr, tdee, goal, target: tdee + goal, age, wDisplay: lb.v };
}
function goalLabel(g) {
  const f = GOALS.find(x => x[0] === g);
  if (!f) return '';
  return f[1] + (g ? ' ' + (g > 0 ? '+' : '−') + Math.abs(g) : '');
}

/* ================= achievements ================= */
const BADGES = [
  ['first', 'First Session', 'Log your first workout', s => s.totalW >= 1, '▲'],
  ['ten', 'Ten Sessions', 'Log 10 workouts', s => s.totalW >= 10, '●'],
  ['fifty', 'Fifty Strong', 'Log 50 workouts', s => s.totalW >= 50, '◆'],
  ['hundred', 'Century Club', 'Log 100 workouts', s => s.totalW >= 100, '★'],
  ['pr5', 'PR Hunter', 'Set 5 personal records', s => s.prCount >= 5, '↑'],
  ['pr25', 'PR Machine', 'Set 25 personal records', s => s.prCount >= 25, '⇈'],
  ['heavy', 'Heavy Day', '10,000 volume in one session', s => s.maxVol >= 10000, '▮'],
  ['week3', 'On a Roll', '3 workouts within 7 days', s => s.bestWeek >= 3, '✦'],
  ['week5', 'Relentless', '5 workouts within 7 days', s => s.bestWeek >= 5, '✷'],
  ['month12', 'Iron Month', '12 workouts in one month', s => s.bestMonth >= 12, '▣'],
  ['allround', 'All-Rounder', 'Log upper, lower, full body and cardio days', s => s.types >= 4, '✚'],
  ['scale14', 'Scale Friend', 'Log body weight 14 times', s => s.bwCount >= 14, '◒'],
];
function badgeStats(excludeDate) {
  const ws = db.workouts.filter(w => w.exercises.length && w.date !== excludeDate);
  let prCount = 0, maxVol = 0;
  const types = new Set(), months = {};
  for (const w of ws) {
    let vol = 0;
    for (const e of w.exercises) for (const s of e.sets) { if (s.pr) prCount++; vol += setVol(s); }
    if (vol > maxVol) maxVol = vol;
    types.add(workoutType(w));
    const m = w.date.slice(0, 7);
    months[m] = (months[m] || 0) + 1;
  }
  const ts = ws.map(w => dateObj(w.date).getTime()).sort((a, b) => a - b);
  let bestWeek = 0;
  for (let i = 0; i < ts.length; i++) {
    let c = 0;
    for (let j = i; j < ts.length && ts[j] - ts[i] < 7 * 864e5; j++) c++;
    if (c > bestWeek) bestWeek = c;
  }
  return {
    totalW: ws.length, prCount, maxVol, bestWeek,
    bestMonth: Object.values(months).reduce((a, b) => Math.max(a, b), 0),
    types: ['upper', 'lower', 'full', 'cardio'].filter(t => types.has(t)).length,
    bwCount: Object.keys(db.bodyweight).length,
  };
}
function earnedBadges(excludeDate) {
  const st = badgeStats(excludeDate);
  return new Set(BADGES.filter(b => b[3](st)).map(b => b[0]));
}
const BADGE_COLS = ['var(--blue)', 'var(--red)', 'var(--green)', 'var(--yellow)'];

function confetti() {
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const c = document.createElement('canvas');
  c.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:99';
  c.width = innerWidth * devicePixelRatio; c.height = innerHeight * devicePixelRatio;
  document.body.appendChild(c);
  const ctx = c.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const cols = ['#5B8FD4', '#D6604C', '#7BAE7F', '#D9A44A', '#EAE7E0'];
  const ps = Array.from({ length: 90 }, (_, i) => ({
    x: Math.random() * innerWidth, y: -30 - Math.random() * innerHeight * 0.4,
    v: 220 + Math.random() * 260, w: 4 + Math.random() * 5, h: 7 + Math.random() * 7,
    rot: Math.random() * 6.3, vr: (Math.random() - 0.5) * 10,
    drift: (Math.random() - 0.5) * 80, col: cols[i % cols.length],
  }));
  let t0 = null;
  function frame(t) {
    if (t0 == null) t0 = t;
    const dt = (t - t0) / 1000;
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    for (const p of ps) {
      ctx.save();
      ctx.translate(p.x + p.drift * dt, p.y + p.v * dt);
      ctx.rotate(p.rot + p.vr * dt);
      ctx.globalAlpha = Math.max(0, 1 - dt / 1.7);
      ctx.fillStyle = p.col;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    if (dt < 1.7) requestAnimationFrame(frame); else c.remove();
  }
  requestAnimationFrame(frame);
}

/* classify a workout by the body groups it hits */
const UPPER_GROUPS = ['Chest', 'Back', 'Shoulders', 'Arms'];
const TYPE_LABEL = { upper: 'Upper body', lower: 'Lower body', full: 'Full body', cardio: 'Cardio', other: 'Other' };
function exerciseGroup(ex) {
  if (ex.group && ex.group !== 'Other') return ex.group;
  const n = ex.name.trim().toLowerCase();
  for (const g of GROUPS)
    if (CATALOG[g].some(e => e[0].toLowerCase() === n)) return g;
  return null;
}
function workoutType(w) {
  let up = 0, lo = 0, cd = 0;
  for (const ex of w.exercises) {
    const g = exerciseGroup(ex);
    if (g === 'Legs') lo++;
    else if (g === 'Conditioning' || g === 'Cardio') cd++;
    else if (UPPER_GROUPS.includes(g)) up++;
  }
  if (up && lo) return 'full';
  if (up) return 'upper';
  if (lo) return 'lower';
  if (cd) return 'cardio';
  return 'other';
}
const distUnit = () => unit() === 'kg' ? 'km' : 'mi';
const isCardio = (ex) => ex.group === 'Cardio';
const isBand = (ex) => ex.equip === 'Band';
const BANDS = [['Yellow', '#E3C13F'], ['Red', '#D6604C'], ['Green', '#7BAE7F'], ['Blue', '#5B8FD4'], ['Black', '#3A4048']];
const bandColor = (name) => { const b = BANDS.find(x => x[0] === name); return b ? b[1] : '#888'; };
const barDefault = () => unit() === 'kg' ? 20 : 45;
const barWeight = () => db.settings.barWeight != null ? db.settings.barWeight : barDefault();
function fmtSetShort(s) {
  const wu = s.wu ? 'W ' : '';
  if (s.min != null) return s.min + 'min' + (s.dist ? ' ' + fmtW(s.dist) + distUnit() : '');
  if (s.band) return wu + s.band + '×' + s.r;
  return wu + (s.dual ? '2×' : '') + fmtW(s.w) + '×' + s.r;
}
function setsSummary(sets) {
  return sets.map(fmtSetShort).join(', ');
}
function setVol(s) { return (s.w || 0) * (s.dual ? 2 : 1) * (s.r || 0); }

/* ================= backup nudge ================= */
function nudgeInfo() {
  if (!db.workouts.length) return null;
  const now = Date.now();
  if (db.settings.nudgeSnooze && now - db.settings.nudgeSnooze < 7 * 864e5) return null;
  const le = db.settings.lastExport;
  if (!le) {
    if (db.workouts.length >= 3) return 'You’ve never backed up <b>' + db.workouts.length + ' workouts</b>.';
    return null;
  }
  const days = Math.floor((now - le) / 864e5);
  if (days > 30) return 'Last backup was <b>' + days + ' days ago</b>.';
  return null;
}

function pendingFor(ex) {
  if (!ui.pending[ex.id]) {
    /* mid-session: continue from this session's last set;
       fresh exercise: start where last session STARTED (its first set), not its top set */
    const lt = lastTime(ex.name, ex.equip, ex.wedge);
    /* prefill from this session's last set, else last session's first WORK set */
    const ltFirst = lt ? (lt.sets.find(x => !x.wu) || lt.sets[0]) : null;
    const last = ex.sets.length ? ex.sets[ex.sets.length - 1] : ltFirst;
    if (isCardio(ex)) {
      ui.pending[ex.id] = { min: last && last.min != null ? last.min : 30, dist: last && last.dist ? last.dist : 0 };
    } else if (isBand(ex)) {
      ui.pending[ex.id] = { band: last && last.band ? last.band : 'Red', r: last && last.r ? last.r : 12, wu: false };
    } else if (last && last.w != null) {
      ui.pending[ex.id] = { w: last.w, r: last.r, dual: !!last.dual, wu: false };
    } else {
      ui.pending[ex.id] = { w: ex.equip === 'Bodyweight' ? 0 : (unit() === 'kg' ? 20 : 45), r: 8, dual: false, wu: false };
    }
  }
  return ui.pending[ex.id];
}

          : s.band
          ? '<span class="banddot" style="background:' + bandColor(s.band) + '"></span>' + esc(s.band) + '<span class="x">×</span>' + s.r

    + '<button data-act="r+" data-id="' + ex.id + '" aria-label="Increase reps">+</button></div>';

    h += '<div class="logbar">'

      + '<div class="stepmid"><input inputmode="numeric" data-mininput="' + ex.id + '" value="' + p.min + '" aria-label="Minutes"><span class="steplbl">min</span></div>'
      + '<button data-act="m+" data-id="' + ex.id + '" aria-label="Increase minutes">+</button></div>'
      + '<div class="step"><button data-act="d-" data-id="' + ex.id + '" aria-label="Decrease distance">−</button>'
      + '<div class="stepmid"><input inputmode="decimal" data-distinput="' + ex.id + '" value="' + fmtW(p.dist) + '" aria-label="Distance"><span class="steplbl">' + distUnit() + ' · optional</span></div>'
      + '<button data-act="d+" data-id="' + ex.id + '" aria-label="Increase distance">+</button></div>'
      + '</div>';
  } else if (isBand(ex)) {
    h += '<div class="logbar">'
      + '<div class="step"><button data-act="b-" data-id="' + ex.id + '" aria-label="Lighter band">−</button>'
      + '<div class="stepmid"><div class="bandval"><span class="banddot" style="background:' + bandColor(p.band) + '"></span>' + esc(p.band) + '</div><span class="steplbl">band</span></div>'
      + '<button data-act="b+" data-id="' + ex.id + '" aria-label="Heavier band">+</button></div>'
      + repsStep + '</div>';
  } else {
    if (ex.equip === 'Cable') {
      h += '<div class="dualrow">'
        + '<button class="chip' + (!p.dual ? ' on' : '') + '" data-act="dual" data-id="' + ex.id + '" data-v="0">One stack</button>'
        + '<button class="chip' + (p.dual ? ' on' : '') + '" data-act="dual" data-id="' + ex.id + '" data-v="1">Both stacks ×2</button>'
        + '</div>';
    }
    h += '<div class="logbar">'
      + '<div class="step"><button data-act="w-" data-id="' + ex.id + '" aria-label="Decrease weight">−</button>'
      + '<div class="stepmid"><input inputmode="decimal" data-winput="' + ex.id + '" value="' + fmtW(p.w) + '" aria-label="Weight"><span class="steplbl">' + (ex.equip === 'Cable' && p.dual ? unit() + ' / stack' : unit()) + '</span></div>'
      + '<button data-act="w+" data-id="' + ex.id + '" aria-label="Increase weight">+</button></div>'
      + repsStep + '</div>';
    if (ex.equip === 'Barbell') {
      const perSide = (p.w - barWeight()) / 2;
      h += '<div class="barrow"><span>Bar</span><input inputmode="decimal" data-barinput value="' + fmtW(barWeight()) + '" aria-label="Bar weight"><span>' + unit() + '</span>'
        + '<span class="plates">' + (perSide >= 0 ? '→ <b>' + fmtW(Math.round(perSide * 100) / 100) + '</b> / side' : '→ below bar weight') + '</span></div>';
    }
  }
  h += '<button class="logset" data-act="log-set" data-id="' + ex.id + '">'
    + (p.wu && !cardio ? 'Log warm-up' : 'Log set ' + (ex.sets.filter(s => !s.wu).length + 1)) + '</button>';

  if (ui.notesOpen[ex.id] || ex.notes) {
    h += '<div class="notewrap"><textarea class="note" data-note="' + ex.id + '" placeholder="Notes — form cues, how it felt…">' + esc(ex.notes || '') + '</textarea></div>';
    h += '<div class="exfoot"><span></span>'
      + (ex.sets.length ? '<button class="exdone" data-act="done-ex" data-id="' + ex.id + '">✓ Done with exercise</button>' : '')
      + '</div>';
  } else {
    h += '<div class="exfoot"><button class="notebtn" data-act="open-note" data-id="' + ex.id + '">+ note</button>'
      + (ex.sets.length ? '<button class="exdone" data-act="done-ex" data-id="' + ex.id + '">✓ Done with exercise</button>' : '')
      + '</div>';
  }
  return h + '</div>';
}

function renderCalendar() {

  const startDow = (first.getDay() + 6) % 7; /* Monday-first grid */
  const daysIn = new Date(y, m + 1, 0).getDate();
  const pad2 = (n) => String(n).padStart(2, '0');
  const wk = new Map(db.workouts.filter(w => w.exercises.length).map(w => [w.date, w]));

  let h = '<div class="viewdate">Calendar</div>'
    + '<div class="calhead"><button data-act="cal-prev" aria-label="Previous month">‹</button>'

    + '<div class="calgrid">'
    + ['MO', 'TU', 'WE', 'TH', 'FR', 'SA', 'SU'].map(d => '<span class="caldow">' + d + '</span>').join('');

/* ================= trends ================= */
function weightExercises() {
  const m = new Map();
  for (const w of sortedWorkouts())
    for (const e of w.exercises) {
      if (e.group === 'Cardio' || e.equip === 'Band') continue;
      if (!e.sets.some(s => !s.wu && s.w > 0)) continue;
      const k = exKey(e.name, e.equip, e.wedge);
      if (!m.has(k)) m.set(k, { key: k, name: e.name, equip: e.equip, wedge: !!e.wedge, n: 0 });
      m.get(k).n++;
    }
  return [...m.values()].sort((a, b) => b.n - a.n);
}
function progressionPoints(key) {
  const pts = [];
  for (const w of [...db.workouts].sort((a, b) => a.date.localeCompare(b.date))) {
    let top = 0;
    for (const e of w.exercises)
      if (exKey(e.name, e.equip, e.wedge) === key)
        for (const s of e.sets)
          if (!s.wu) { const eff = (s.w || 0) * (s.dual ? 2 : 1); if (eff > top) top = eff; }
    if (top > 0) pts.push({ d: w.date, y: top });
  }
  return pts;
}
function lineChartSVG(pts, color) {
  const W = 340, H = 130, L = 38, R = 14, T = 14, B = 24;
  const ys = pts.map(p => p.y), mn = Math.min(...ys), mx = Math.max(...ys), span = (mx - mn) || 1;
  const X = i => L + i * (W - L - R) / (pts.length - 1);
  const Y = v => T + (H - T - B) * (1 - (v - mn) / span);
  let d = '';
  pts.forEach((p, i) => { d += (i ? 'L' : 'M') + X(i).toFixed(1) + ',' + Y(p.y).toFixed(1); });
  const lx = X(pts.length - 1), ly = Y(pts[pts.length - 1].y);
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto" role="img">'
    + '<path d="' + d + ' L' + lx.toFixed(1) + ',' + (H - B) + ' L' + L + ',' + (H - B) + ' Z" fill="' + color + '" opacity=".08"/>'
    + '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
    + '<circle cx="' + lx.toFixed(1) + '" cy="' + ly.toFixed(1) + '" r="3.5" fill="' + color + '"/>'
    + '<text x="' + (L - 7) + '" y="' + (T + 4) + '" text-anchor="end" font-size="10" fill="#A19D95">' + fmtW(mx) + '</text>'
    + '<text x="' + (L - 7) + '" y="' + (H - B + 4) + '" text-anchor="end" font-size="10" fill="#A19D95">' + fmtW(mn) + '</text>'
    + '<text x="' + L + '" y="' + (H - 7) + '" font-size="10" fill="#6E6B64">' + fmtShort(pts[0].d) + '</text>'
    + '<text x="' + (W - R) + '" y="' + (H - 7) + '" text-anchor="end" font-size="10" fill="#6E6B64">' + fmtShort(pts[pts.length - 1].d) + '</text>'
    + '</svg>';
}
function barChartSVG(bars, color) {
  const W = 340, H = 130, L = 38, R = 8, T = 14, B = 24;
  const mx = Math.max(1, ...bars.map(b => b.v));
  const bw = (W - L - R) / bars.length;
  let el = '';
  bars.forEach((b, i) => {
    const bh = (H - T - B) * b.v / mx;
    const x = L + i * bw + 2, y = H - B - bh;
    el += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + Math.max(bw - 4, 2).toFixed(1) + '" height="' + Math.max(bh, 1.5).toFixed(1) + '" rx="2" fill="' + color + '" opacity="' + (b.v ? '.9' : '.15') + '"/>';
    if (i % 4 === 0) el += '<text x="' + (x + (bw - 4) / 2).toFixed(1) + '" y="' + (H - 7) + '" text-anchor="middle" font-size="9" fill="#6E6B64">' + b.label + '</text>';
  });
  el += '<text x="' + (L - 7) + '" y="' + (T + 4) + '" text-anchor="end" font-size="10" fill="#A19D95">' + (mx >= 2000 ? Math.round(mx / 1000) + 'k' : Math.round(mx)) + '</text>';
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto" role="img">' + el + '</svg>';
}
function trendChartInner() {
  const pts = progressionPoints(ui.trendEx);
  if (pts.length < 2) return '<div class="dhint">Log this exercise in two or more sessions to see its trend.</div>';
  const first = pts[0].y, latest = pts[pts.length - 1].y;
  return lineChartSVG(pts, '#5B8FD4')
    + '<div class="tdelta">First <b>' + fmtW(first) + '</b> → latest <b>' + fmtW(latest) + ' ' + unit() + '</b>'
    + (latest !== first ? ' (' + (latest > first ? '+' : '−') + fmtW(Math.abs(latest - first)) + ')' : '')
    + ' · ' + pts.length + ' sessions</div>';
}
function renderTrends() {
  let h = '<div class="viewdate">Trends</div>';
  const hasData = db.workouts.some(w => w.exercises.length);
  if (!hasData && !Object.keys(db.bodyweight).length) {
    return h + '<div class="empty"><span class="big">No trends yet</span>Charts appear once you log a few workouts.</div>';
  }

  /* exercise progression */
  const known = weightExercises();
  if (known.length) {
    if (!ui.trendEx || !known.find(k => k.key === ui.trendEx)) ui.trendEx = known[0].key;
    const pts = progressionPoints(ui.trendEx);
    h += '<div class="dsec"><h2>Exercise · top set</h2>'
      + '<select class="exsel trendsel" id="trendSelect">'
      + known.map(k => '<option value="' + esc(k.key) + '"' + (k.key === ui.trendEx ? ' selected' : '') + '>'
          + esc(k.name) + (k.equip ? ' · ' + esc(EQ_SHORT[k.equip] || k.equip) : '') + (k.wedge ? ' · Wedge' : '') + '</option>').join('')
      + '</select>'
      + '<div id="trendChart">' + trendChartInner() + '</div>'
      + '</div>';
  }

  /* weekly volume, last 12 weeks */
  const now = new Date();
  const mon = new Date(now.getFullYear(), now.getMonth(), now.getDate() - ((now.getDay() + 6) % 7));
  const weeks = [];
  for (let k = 11; k >= 0; k--) {
    const st = new Date(mon); st.setDate(mon.getDate() - 7 * k);
    const en = new Date(st); en.setDate(st.getDate() + 7);
    weeks.push({ st, en, label: (st.getMonth() + 1) + '/' + st.getDate(), v: 0 });
  }
  for (const w of db.workouts) {
    const t = dateObj(w.date);
    for (const wk of weeks)
      if (t >= wk.st && t < wk.en) { wk.v += w.exercises.reduce((a, e) => a + e.sets.reduce((b, s) => b + setVol(s), 0), 0); break; }
  }
  if (weeks.some(w => w.v > 0)) {
    h += '<div class="dsec"><h2>Weekly volume · ' + unit() + '</h2>' + barChartSVG(weeks, '#7BAE7F') + '</div>';
  }

  /* body weight, last 90 days */
  const cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 90);
  const bwPts = Object.keys(db.bodyweight).sort()
    .filter(d => dateObj(d) >= cutoff)
    .map(d => ({ d, y: db.bodyweight[d] }));
  if (bwPts.length >= 2) {
    h += '<div class="dsec"><h2>Body weight · 90 days</h2>' + lineChartSVG(bwPts, '#D9A44A')
      + '<div class="tdelta">' + fmtW(bwPts[0].y) + ' → <b>' + fmtW(bwPts[bwPts.length - 1].y) + ' ' + unit() + '</b> ('
      + (bwPts[bwPts.length - 1].y >= bwPts[0].y ? '+' : '−') + fmtW(Math.abs(bwPts[bwPts.length - 1].y - bwPts[0].y)) + ')</div></div>';
  } else if (Object.keys(db.bodyweight).length < 2) {
    h += '<div class="dsec"><h2>Body weight</h2><div class="dhint">Weigh in on a few different days to see your trend here.</div></div>';
  }
  return h;
}

    + '<button data-act="sex" data-s="m" class="' + (p.sex === 'm' ? 'on' : '') + '">Male</button>'
    + '<button data-act="sex" data-s="f" class="' + (p.sex === 'f' ? 'on' : '') + '">Female</button></div></div>'
    + '<div class="drow"><span class="lbl">Activity</span><select class="exsel" id="actSelect" style="width:auto;padding:9px 12px;font-size:16px">'
    + ACTIVITY.map(a => '<option value="' + a[0] + '"' + ((p.activity || 1.55) === a[0] ? ' selected' : '') + '>' + a[1] + ' · ' + a[2] + '</option>').join('')
    + '</select></div>'
    + '<div class="flabel">Goal</div><div class="chips">'
    + GOALS.map(g => '<button class="chip' + ((p.goal || 0) === g[0] ? ' on' : '') + '" data-act="goal" data-g="' + g[0] + '">' + g[1] + (g[0] ? ' ' + (g[0] > 0 ? '+' : '−') + Math.abs(g[0]) : '') + '</button>').join('')
    + '</div>';
  if (ti && !ti.missingWeight) {
    h += '<div class="tdee" style="margin:14px 0 0"><div><div class="bwlbl">Daily target</div><div class="tval">' + ti.target.toLocaleString() + ' kcal</div></div>'
      + '<div class="tsub">BMR ' + ti.bmr.toLocaleString() + ' · TDEE ' + ti.tdee.toLocaleString() + ' kcal<br>' + fmtW(ti.wDisplay) + ' ' + unit() + ' · ' + Math.round(p.heightCm) + ' cm · age ' + ti.age + '</div></div>';
  } else if (ti && ti.missingWeight) {
    h += '<div class="dhint">Log a body weight on the Log tab to calculate your targets.</div>';
  } else {
    h += '<div class="dhint">Fill in date of birth, height and sex to calculate your daily calories.</div>';
  }
  h += '<div class="dhint">Estimates use the Mifflin-St Jeor formula and update automatically with your latest body weight.</div></div>';

  h += '<div class="dsec"><h2>Storage</h2>'
    + '<div class="drow"><span class="lbl">Persistent storage</span><span class="val" id="persistStatus">checking…</span></div>'
    + '<div class="drow"><span class="lbl">Workouts stored</span><span class="val num">' + db.workouts.length + '</span></div>'
    + '<div class="dhint">On iOS, clearing Safari history won’t touch this installed app — but deleting its Home Screen icon deletes all data.</div></div>';

  h += '<div class="dsec"><h2>Preferences</h2>'
    + '<div class="drow"><span class="lbl">Weight unit</span>'
    + '<div class="seg"><button data-act="unit" data-u="kg" class="' + (unit() === 'kg' ? 'on' : '') + '">kg</button>'
    + '<button data-act="unit" data-u="lb" class="' + (unit() === 'lb' ? 'on' : '') + '">lb</button></div></div>'
    + '<div class="dhint">Label only — existing entries are not converted.</div></div>';

  h += '<div class="dsec"><h2>Danger zone</h2>'
    + '<button class="dbtn danger' + (armedErase ? ' arm' : '') + '" data-act="erase">' + (armedErase ? 'Tap again to erase everything' : 'Erase all data') + '</button></div>';
  return h;
}

async function refreshPersistStatus() {
  const el = document.getElementById('persistStatus');
  if (!el) return;
  try {
    if (navigator.storage && navigator.storage.persisted) {
      const p = await navigator.storage.persisted();
      el.textContent = p ? 'Granted' : 'Not granted';
      el.className = 'val ' + (p ? 'ok' : 'warn');
      return;
    }
  } catch (e) {}
  el.textContent = 'Unavailable';
}

/* ================= actions ================= */
function arm(id) {
  if (ui.armed === id) { ui.armed = null; clearTimeout(ui.armTimer); return true; }
  ui.armed = id;
  clearTimeout(ui.armTimer);
  ui.armTimer = setTimeout(() => { ui.armed = null; render(); }, 2600);
  return false;
}

function doExport() {
  const payload = { app: 'ironlog', version: 3, exported: new Date().toISOString(), settings: { unit: unit() }, workouts: db.workouts, bodyweight: db.bodyweight, profile: db.profile };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ironlog-backup-' + todayStr() + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  db.settings.lastExport = Date.now();
  db.settings.nudgeSnooze = null;
  save();
  ui.exportedFlash = true;
  setTimeout(() => { ui.exportedFlash = false; render(); }, 2200);
}

function addExercise(def) {
  const name = (def.name || '').trim();
  if (!name) return;
  const s = ensureSession();
  /* superset: adding while the previous exercise is still open (has sets, not done) links them */
  const prev = s.exercises[s.exercises.length - 1];
  let ss = null;
  if (prev && !prev.done && prev.sets.length) {
    if (!prev.ss) prev.ss = uid();
    ss = prev.ss;
  }
  s.exercises.push({ id: uid(), name, group: def.group || null, equip: def.equip || null, wedge: !!def.wedge, ss, notes: '', sets: [] });
  resetAddForm(false);
  save(); render();
}
function resetAddForm(open) {
  ui.addingEx = open;
  ui.addMode = 'browse';
  ui.addGroup = null; ui.addExName = null; ui.addEquip = null; ui.customName = '';
}

const actions = {
  'add-ex': () => { resetAddForm(true); render(); },
  'cancel-ex': () => { resetAddForm(false); render(); },
  'confirm-ex': () => {
    if (ui.addMode === 'custom') {
      addExercise({ name: ui.customName, group: ui.addGroup || 'Other', equip: ui.addEquip });
    } else if (ui.addExName) {
      addExercise({ name: ui.addExName, group: ui.addGroup, equip: ui.addEquip });
    }
  },
  'pick-ex': (el) => addExercise({ name: el.dataset.name, equip: el.dataset.equip || null, group: el.dataset.group || null, wedge: el.dataset.wedge === '1' }),
  'grp': (el) => {
    ui.addGroup = el.dataset.g;
    if (ui.addMode !== 'custom') { ui.addExName = null; ui.addEquip = null; }
    render();
  },
  'equip': (el) => {
    const q = el.dataset.e;
    ui.addEquip = (ui.addMode === 'custom' && ui.addEquip === q) ? null : q;
    render();
  },
  'mode-custom': () => { ui.addMode = 'custom'; ui.addGroup = null; ui.addExName = null; ui.addEquip = null; render(); setTimeout(() => { const i = document.getElementById('exNameInput'); if (i) i.focus(); }, 50); },
  'mode-browse': () => { ui.addMode = 'browse'; ui.addGroup = null; ui.addEquip = null; ui.customName = ''; render(); },
  'cal-prev': () => { ui.calM--; if (ui.calM < 0) { ui.calM = 11; ui.calY--; } ui.calSel = null; render(); },
  'cal-next': () => { ui.calM++; if (ui.calM > 11) { ui.calM = 0; ui.calY++; } ui.calSel = null; render(); },
  'cal-day': (el) => { ui.calSel = (ui.calSel === el.dataset.d) ? null : el.dataset.d; render(); },
  'cal-edit': (el) => {
    ui.logDate = el.dataset.d === todayStr() ? null : el.dataset.d;
    tab = 'log';
    render();
  },
  'back-today': () => { ui.logDate = null; resetAddForm(false); render(); },
  'finish': () => {
    const s = getSession();
    if (s && s.exercises.some(e => e.sets.length)) {
      s.done = Date.now();
      save(); render();
      confetti();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  },
  'reopen': () => {
    const s = getSession();
    if (s) { s.done = null; save(); render(); }
  },
  'w+': (el) => { const p = ui.pending[el.dataset.id]; p.w = Math.max(0, Math.round((p.w + wStep()) * 100) / 100); render(); },
  'w-': (el) => { const p = ui.pending[el.dataset.id]; p.w = Math.max(0, Math.round((p.w - wStep()) * 100) / 100); render(); },
  'r+': (el) => { const p = ui.pending[el.dataset.id]; p.r = Math.min(999, p.r + 1); render(); },
  'r-': (el) => { const p = ui.pending[el.dataset.id]; p.r = Math.max(1, p.r - 1); render(); },
  'm+': (el) => { const p = ui.pending[el.dataset.id]; p.min = Math.min(999, p.min + 5); render(); },
  'm-': (el) => { const p = ui.pending[el.dataset.id]; p.min = Math.max(1, p.min - 5); render(); },
  'd+': (el) => { const p = ui.pending[el.dataset.id]; p.dist = Math.round(Math.min(999, p.dist + 0.5) * 100) / 100; render(); },
  'd-': (el) => { const p = ui.pending[el.dataset.id]; p.dist = Math.round(Math.max(0, p.dist - 0.5) * 100) / 100; render(); },
  'b+': (el) => { const p = ui.pending[el.dataset.id]; const i = BANDS.findIndex(b => b[0] === p.band); p.band = BANDS[Math.min(BANDS.length - 1, i + 1)][0]; render(); },
  'b-': (el) => { const p = ui.pending[el.dataset.id]; const i = BANDS.findIndex(b => b[0] === p.band); p.band = BANDS[Math.max(0, i - 1)][0]; render(); },
  'dual': (el) => { const p = ui.pending[el.dataset.id]; p.dual = el.dataset.v === '1'; render(); },
  'wu': (el) => { const p = ui.pending[el.dataset.id]; p.wu = !p.wu; render(); },
  'wedge': (el) => {
    const s = getSession(); if (!s) return;
    const ex = s.exercises.find(e => e.id === el.dataset.id); if (!ex) return;
    ex.wedge = !ex.wedge;
    delete ui.pending[ex.id]; /* re-prefill from the right variant's history */
    save(); render();
  },
  'unlink-ss': (el) => {
    const s = getSession(); if (!s) return;
    const ex = s.exercises.find(e => e.id === el.dataset.id); if (!ex) return;
    const g = ex.ss;
    ex.ss = null;
    const rest = s.exercises.filter(e => e.ss === g);
    if (rest.length === 1) rest[0].ss = null; /* a superset of one is not a superset */
    save(); render();
  },
  'log-set': (el) => {
    const s = getSession(); if (!s) return;
    const ex = s.exercises.find(e => e.id === el.dataset.id); if (!ex) return;
    const p = pendingFor(ex);
    if (isCardio(ex)) {
      ex.sets.push({ min: p.min, dist: p.dist || 0 });
    } else if (isBand(ex)) {
      const set = { band: p.band, r: p.r };
      if (p.wu) set.wu = true;
      ex.sets.push(set);
    } else {
      const set = { w: p.w, r: p.r };
      if (p.dual) set.dual = true;
      if (p.wu) {
        set.wu = true; /* warm-ups never PR */
      } else {
        const prev = maxWeight(ex.name, ex.equip, ex.wedge);
        const eff = p.w * (p.dual ? 2 : 1);
        if (prev > 0 && eff > prev) set.pr = true;
      }
      ex.sets.push(set);
    }
    save(); render();
  },
  'done-ex': (el) => {
    const s = getSession(); if (!s) return;
    const ex = s.exercises.find(e => e.id === el.dataset.id);
    if (ex && ex.sets.length) { ex.done = true; save(); render(); }
  },
  'reopen-ex': (el) => {
    const s = getSession(); if (!s) return;
    const ex = s.exercises.find(e => e.id === el.dataset.id);
    if (ex) { ex.done = false; save(); render(); }
  },
  'del-set': (el) => {
    if (!arm('set-' + el.dataset.id + '-' + el.dataset.i)) { render(); return; }
    const s = getSession(); if (!s) return;
    const ex = s.exercises.find(e => e.id === el.dataset.id); if (!ex) return;
    ex.sets.splice(Number(el.dataset.i), 1);
    save(); render();
  },
  'del-ex': (el) => {
    if (!arm('ex-' + el.dataset.id)) { render(); return; }
    const s = getSession(); if (!s) return;
    s.exercises = s.exercises.filter(e => e.id !== el.dataset.id);
    if (!s.exercises.length && !s.note) db.workouts = db.workouts.filter(w => w.id !== s.id);
    save(); render();
  },
  'del-w': (el) => {
    if (!arm('w-' + el.dataset.id)) { render(); return; }
    db.workouts = db.workouts.filter(w => w.id !== el.dataset.id);
    save(); render();
  },
  'open-note': (el) => { ui.notesOpen[el.dataset.id] = true; render(); },
  'export': doExport,
  'nudge-export': doExport,
  'import': () => document.getElementById('importFile').click(),
  'import-merge': () => {
    const have = new Set(db.workouts.map(w => w.id));
    for (const w of ui.importPending.workouts) if (!have.has(w.id)) db.workouts.push(w);
    if (ui.importPending.bodyweight)
      for (const k in ui.importPending.bodyweight)
        if (!(k in db.bodyweight)) db.bodyweight[k] = ui.importPending.bodyweight[k];
    if (ui.importPending.profile && !profileComplete()) db.profile = ui.importPending.profile;
    ui.importPending = null; save(); render();
  },
  'import-replace': () => {
    db.workouts = ui.importPending.workouts;
    db.bodyweight = ui.importPending.bodyweight || {};
    db.profile = ui.importPending.profile || {};
    ui.importPending = null; save(); render();
  },
  'import-cancel': () => { ui.importPending = null; render(); },
  'unit': (el) => { db.settings.unit = el.dataset.u; save(); render(); },
  'sex': (el) => { db.profile.sex = el.dataset.s; save(); render(); },
  'goal': (el) => { db.profile.goal = parseInt(el.dataset.g, 10); save(); render(); },
  'setup-tdee': () => { tab = 'data'; render(); },
  'dismiss-tdee': () => { db.settings.tdeeDismissed = true; save(); render(); },
  'erase': () => {
    if (!arm('erase')) { render(); return; }
    db = { workouts: [], bodyweight: {}, profile: {}, settings: { unit: unit(), lastExport: null, nudgeSnooze: null } };
    save(); render();
  },
};

document.addEventListener('click', (e) => {
  const tabBtn = e.target.closest('nav.tabs button');
  if (tabBtn) { tab = tabBtn.dataset.tab; resetAddForm(false); ui.armed = null; ui.logDate = null; render(); return; }
  const el = e.target.closest('[data-act]');
  if (!el) return;
  const fn = actions[el.dataset.act];
  if (fn) fn(el);
});

document.addEventListener('change', (e) => {
  const t = e.target;
  if (t.dataset.winput) {
    const p = ui.pending[t.dataset.winput];
    const v = parseFloat(String(t.value).replace(',', '.'));
    p.w = isFinite(v) && v >= 0 ? Math.round(v * 100) / 100 : p.w;
    t.value = fmtW(p.w);
  } else if (t.dataset.rinput) {
    const p = ui.pending[t.dataset.rinput];
    const v = parseInt(t.value, 10);
    p.r = isFinite(v) && v >= 1 ? Math.min(999, v) : p.r;
    t.value = p.r;
  } else if (t.dataset.mininput) {
    const p = ui.pending[t.dataset.mininput];
    const v = parseInt(t.value, 10);
    p.min = isFinite(v) && v >= 1 ? Math.min(999, v) : p.min;
    t.value = p.min;
  } else if (t.dataset.distinput) {
    const p = ui.pending[t.dataset.distinput];
    const v = parseFloat(String(t.value).replace(',', '.'));
    p.dist = isFinite(v) && v >= 0 ? Math.round(v * 100) / 100 : p.dist;
    t.value = fmtW(p.dist);
  } else if (t.id === 'trendSelect') {
    /* update the chart in place — re-rendering would dismiss the iOS picker wheel */
    ui.trendEx = t.value;
    const tc = document.getElementById('trendChart');
    if (tc) tc.innerHTML = trendChartInner();
  } else if (t.id === 'exSelect') {
    ui.addExName = t.value || null;
    ui.addEquip = ui.addExName ? allowedEquip(ui.addExName)[0] : null;
    render();
  } else if (t.id === 'bwInput') {
    const v = parseFloat(String(t.value).replace(',', '.'));
    if (t.value.trim() === '') delete db.bodyweight[LD()];
    else if (isFinite(v) && v > 0 && v < 1000) db.bodyweight[LD()] = Math.round(v * 10) / 10;
    save(); render();
  } else if (t.dataset.barinput != null) {
    const v = parseFloat(String(t.value).replace(',', '.'));
    if (isFinite(v) && v >= 0 && v < 100) db.settings.barWeight = Math.round(v * 100) / 100;
    save(); render();
  } else if (t.id === 'dobInput') {
    /* iOS fires change on every picker-wheel tick; re-rendering here would
       destroy the input and dismiss the picker mid-scroll. Save silently,
       update the age label in place, and do the full render on focusout. */
    db.profile.dob = t.value || null;
    save();
    const age = document.getElementById('dobAge');
    if (age) age.textContent = db.profile.dob ? ageFromDob(db.profile.dob) + 'y' : '';
  } else if (t.id === 'actSelect') {
    db.profile.activity = parseFloat(t.value);
    save(); /* no render — keep the iOS wheel open; full render on focusout */
  } else if (t.id === 'htInput') {
    const v = parseFloat(String(t.value).replace(',', '.'));
    if (t.value.trim() === '') db.profile.heightCm = null;
    else if (isFinite(v) && v > 0 && v < 300) db.profile.heightCm = Math.round((unit() === 'lb' ? v * 2.54 : v) * 10) / 10;
    save(); render();
  } else if (t.id === 'importFile') {
    const f = t.files[0];
    t.value = '';
    if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const d = JSON.parse(rd.result);
        if (d && Array.isArray(d.workouts)) { ui.importPending = d; render(); }
        else alert('That file doesn’t look like an IronLog backup.');
      } catch (err) { alert('Couldn’t read that file — it isn’t valid JSON.'); }
    };
    rd.readAsText(f);
  }
});

/* notes save as you type, without re-render */
document.addEventListener('input', (e) => {
  const t = e.target;
  if (t.id === 'exNameInput') { ui.customName = t.value; return; }
  if (!t.dataset || !t.dataset.note) return;
  if (t.dataset.note === 'session') {
    const s = getSession();
    if (s) { s.note = t.value; save(); }
  } else {
    const s = getSession(); if (!s) return;
    const ex = s.exercises.find(x => x.id === t.dataset.note);
    if (ex) { ex.notes = t.value; save(); }
  }
});

/* dob/activity pickers save silently on change; refresh the view once they close */
document.addEventListener('focusout', (e) => {
  if (e.target.id === 'dobInput' || e.target.id === 'actSelect') render();
});

/* Enter key in add-exercise input */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.id === 'exNameInput') {
    e.preventDefault();
    ui.customName = e.target.value;
    actions['confirm-ex']();
  }
});

/* ask the browser not to evict our data */
if (navigator.storage && navigator.storage.persist) {
  navigator.storage.persist().catch(() => {});
}

render();

/* offline support */
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
